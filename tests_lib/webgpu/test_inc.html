<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebGPU inc API test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        line-height: 1.5;
      }

      pre {
        background: #111;
        color: #eee;
        padding: 1rem;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .ok {
        color: green;
      }

      .fail {
        color: red;
      }
    </style>
  </head>

  <body>
    <h1>WebGPU inc API test</h1>
    <p>
      This page tests the shared <code>FutharkModule</code> API in a normal browser.
    </p>

    <pre id="log"></pre>

    <!-- Generated by: futhark webgpu --library -o build/inc/inc inc.fut -->
    <script src="build/inc/inc.js"></script>

    <script>
      const logEl = document.getElementById("log");

      function log(line = "") {
        console.log(line);
        logEl.textContent += line + "\n";
      }

      function section(title) {
        log("");
        log("== " + title + " ==");
      }

      function ok(message) {
        log("  ✓ " + message);
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message || "Assertion failed");
        }
      }

      function assertEqual(actual, expected, message) {
        if (actual !== expected) {
          throw new Error(message || "Expected " + expected + ", got " + actual);
        }
      }

      async function main() {
        log("Testing inc.fut in browser");

        section("Environment");

        assert(typeof navigator !== "undefined" && !!navigator.gpu,
          "navigator.gpu should exist");

        ok("WebGPU is available");

        section("Preferred FutharkModule API");

        const module = await Module();
        const fut = new FutharkModule();

        assert(fut instanceof FutharkModule, "fut should be a FutharkModule");

        await fut.init(module);

        assert(fut.entry, "fut.entry should exist");
        assert(typeof fut.entry.inc === "function", "fut.entry.inc should be a function");

        const module_api_res = await fut.entry.inc(9);
        assertEqual(module_api_res, 10);

        ok("FutharkModule supports init(module) and entry aliases");

        section("Shared utility methods");

        assert(typeof fut.context_sync === "function", "context_sync should exist");
        assert(typeof fut.clear_caches === "function", "clear_caches should exist");
        assert(typeof fut.report === "function", "report should exist");
        assert(typeof fut.pause_profiling === "function", "pause_profiling should exist");
        assert(typeof fut.unpause_profiling === "function", "unpause_profiling should exist");

        await fut.context_sync();
        await fut.clear_caches();

        const report = await fut.report();
        assert(typeof report === "string", "report should return a string");

        await fut.pause_profiling();
        await fut.unpause_profiling();

        ok("context_sync(), clear_caches(), report(), pause_profiling(), and unpause_profiling() work");

        section("Cleanup");

        fut.free();

        ok("context freed");

        log("");
        log("inc browser test complete");
      }

      main().catch((err) => {
        console.error(err);
        log("");
        log("TEST FAILED");
        log(err && err.stack ? err.stack : String(err));
        document.body.classList.add("fail");
      });
    </script>
  </body>
</html>
