<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WebGPU array API test</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        line-height: 1.5;
      }

      pre {
        background: #111;
        color: #eee;
        padding: 1rem;
        border-radius: 8px;
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <h1>WebGPU array API test</h1>
    <p>
      This page tests the shared <code>FutharkModule</code> and
      <code>FutharkArray</code> API in a normal browser.
    </p>

    <pre id="log"></pre>

    <!-- Generated by: futhark webgpu --library -o build/array/array array.fut -->
    <script src="build/array/array.js"></script>

    <script>
      const logEl = document.getElementById("log");

      function log(line = "") {
        console.log(line);
        logEl.textContent += line + "\n";
      }

      function section(title) {
        log("");
        log("== " + title + " ==");
      }

      function ok(message) {
        log("  ✓ " + message);
      }

      function assert(condition, message) {
        if (!condition) {
          throw new Error(message || "Assertion failed");
        }
      }

      function assertEqual(actual, expected, message) {
        if (actual !== expected) {
          throw new Error(message || "Expected " + expected + ", got " + actual);
        }
      }

      function assertClose(actual, expected, message) {
        if (Math.abs(actual - expected) >= 0.0001) {
          throw new Error(message || "Expected " + expected + ", got " + actual);
        }
      }

      async function main() {
        log("Testing array.fut in browser");

        section("Environment");

        assert(
          typeof navigator !== "undefined" && !!navigator.gpu,
          "navigator.gpu should exist"
        );

        ok("WebGPU is available");

        section("Preferred FutharkModule API");

        const module = await Module();
        const fut = new FutharkModule();

        assert(fut instanceof FutharkModule, "fut should be a FutharkModule");

        await fut.init(module);

        assert(fut.entry, "fut.entry should exist");
        assert(fut.i32_1d, "fut.i32_1d should exist");
        assert(fut.i64_2d, "fut.i64_2d should exist");
        assert(fut.f32_1d, "fut.f32_1d should exist");
        assert(fut.f32_2d, "fut.f32_2d should exist");

        assert(fut.types["[]i32"], 'fut.types["[]i32"] should exist');
        assert(fut.types["[][]i64"], 'fut.types["[][]i64"] should exist');
        assert(fut.types["[]f32"], 'fut.types["[]f32"] should exist');
        assert(fut.types["[][]f32"], 'fut.types["[][]f32"] should exist');

        ok("FutharkModule exposes entry, types, and array constructors");

        section("Array construction and entry calls");

        const xs_i32 = new Int32Array([1, 2, 3, 4, 5]);
        const fut_xs_i32 = fut.i32_1d.from_data(xs_i32, xs_i32.length);

        const sum_i32 = await fut.entry.sum_i32_1d(fut_xs_i32);
        assertEqual(sum_i32, 15);

        const xs_i64 = new BigInt64Array([1n, 2n, 3n, 4n, 5n, 6n]);
        const fut_xs_i64 = fut.i64_2d.from_data(xs_i64, 2, 3);

        const first_i64 = await fut.entry.first_i64_2d(fut_xs_i64);
        assertEqual(first_i64, 1n);

        ok("from_data() works for 1D and 2D arrays");

        section("Array construction from plain JavaScript arrays");

        const fut_xs_i32_jsarray = fut.i32_1d.from_data([1, 2, 3, 4, 5], 5);
        const jsarray_sum_i32 = await fut.entry.sum_i32_1d(fut_xs_i32_jsarray);

        assertEqual(jsarray_sum_i32, 15);

        ok("from_data() accepts plain JavaScript arrays");

        section("Type lookup aliases");

        assert(
          fut.types["[]i32"] === fut.i32_1d,
          'fut.types["[]i32"] should equal fut.i32_1d'
        );

        assert(
          fut.types["[][]i64"] === fut.i64_2d,
          'fut.types["[][]i64"] should equal fut.i64_2d'
        );

        const I32_1D = fut.types["[]i32"];
        const fut_xs_i32_from_type = I32_1D.from_data(xs_i32, xs_i32.length);

        const type_lookup_sum_i32 = await fut.entry.sum_i32_1d(fut_xs_i32_from_type);
        assertEqual(type_lookup_sum_i32, 15);

        ok("type lookup aliases work");

        section("Returned arrays");

        const fut_replicated_1d = await fut.entry.replicate_f32_1d(4n, 1.5);

        assertEqual(typeof fut_replicated_1d.values, "function");
        assertEqual(typeof fut_replicated_1d.shape, "function");
        assertEqual(typeof fut_replicated_1d.toTypedArray, "function");
        assertEqual(typeof fut_replicated_1d.toArray, "function");
        assertEqual(typeof fut_replicated_1d.futharkType, "function");

        const values_1d = await fut_replicated_1d.values();
        const shape_1d = fut_replicated_1d.shape();
        const typed_1d = await fut_replicated_1d.toTypedArray();
        const nested_1d = await fut_replicated_1d.toArray();

        assert(values_1d instanceof Float32Array, "values() should return Float32Array");
        assert(typed_1d instanceof Float32Array, "toTypedArray() should return Float32Array");
        assert(shape_1d instanceof BigInt64Array, "shape() should return BigInt64Array");

        assertEqual(shape_1d.length, 1);
        assertEqual(shape_1d[0], 4n);

        assertEqual(values_1d.length, 4);
        assertEqual(typed_1d.length, 4);
        assertEqual(nested_1d.length, 4);

        for (let i = 0; i < 4; i++) {
          assertClose(values_1d[i], 1.5);
          assertClose(typed_1d[i], 1.5);
          assertClose(nested_1d[i], 1.5);
        }

        ok("values(), shape(), toTypedArray(), toArray(), and futharkType() work for 1D arrays");

        const fut_replicated_2d = await fut.entry.replicate_f32_2d(2n, 3n, 2.5);

        const values_2d = await fut_replicated_2d.values();
        const shape_2d = fut_replicated_2d.shape();
        const typed_2d = await fut_replicated_2d.toTypedArray();
        const nested_2d = await fut_replicated_2d.toArray();

        assert(values_2d instanceof Float32Array, "values() should return Float32Array");
        assert(typed_2d instanceof Float32Array, "toTypedArray() should return Float32Array");
        assert(shape_2d instanceof BigInt64Array, "shape() should return BigInt64Array");

        assertEqual(shape_2d.length, 2);
        assertEqual(shape_2d[0], 2n);
        assertEqual(shape_2d[1], 3n);

        assertEqual(values_2d.length, 6);
        assertEqual(typed_2d.length, 6);

        assertEqual(nested_2d.length, 2);
        assertEqual(nested_2d[0].length, 3);

        for (let i = 0; i < 2; i++) {
          for (let j = 0; j < 3; j++) {
            assertClose(nested_2d[i][j], 2.5);
          }
        }

        ok("returned 2D arrays expose shared array helpers");

        section("Shared API only");

        const shared_xs = fut.i32_1d.from_data(new Int32Array([10, 20, 30]), 3);
        const shared_sum = await fut.entry.sum_i32_1d(shared_xs);

        assertEqual(shared_sum, 60);

        const shared_arr = await fut.entry.replicate_f32_1d(2n, 7.5);
        const shared_values = await shared_arr.values();
        const shared_shape = shared_arr.shape();

        assert(shared_values instanceof Float32Array, "values() should return Float32Array");
        assert(shared_shape instanceof BigInt64Array, "shape() should return BigInt64Array");

        assertEqual(shared_shape[0], 2n);
        assertEqual(shared_values.length, 2);
        assertClose(shared_values[0], 7.5);
        assertClose(shared_values[1], 7.5);

        ok("FutharkModule can be used through the shared API only");

        section("Cleanup");

        fut_xs_i32.free();
        fut_xs_i64.free();
        fut_xs_i32_jsarray.free();
        fut_xs_i32_from_type.free();
        fut_replicated_1d.free();
        fut_replicated_2d.free();
        shared_xs.free();
        shared_arr.free();

        fut.free();

        ok("all allocated arrays and context freed");

        log("");
        log("array browser test complete");
      }

      main().catch((err) => {
        console.error(err);
        log("");
        log("TEST FAILED");
        log(err && err.stack ? err.stack : String(err));
      });
    </script>
  </body>
</html>
